name: Manual URL Trigger

on:
  workflow_dispatch:
    inputs:
      url:
        description: "URL to process"
        required: true
        type: string

jobs:
  run:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up uv
        uses: astral-sh/setup-uv@v5

      - name: Run with URL
        run: uv run tien-link --url "${{ github.event.inputs.url }}"

      - name: Re-trigger workflow
        run: |
          gh workflow run manual-url.yml \
            --repo "${{ github.repository }}" \
            --field url="${{ github.event.inputs.url }}"
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
