name: Stop All Workflows

on:
  workflow_dispatch:

jobs:
  stop:
    runs-on: ubuntu-latest

    steps:
      - name: Cancel all running workflows
        run: |
          while true; do
            ids=$(gh run list --repo "${{ github.repository }}" --status in_progress --json databaseId -q '.[].databaseId' | grep -v "^${{ github.run_id }}$" || true)
            [ -z "$ids" ] && echo "No more runs." && break
            echo "$ids" | while read id; do
              echo "Cancelling run $id"
              gh run cancel "$id" --repo "${{ github.repository }}" || true
            done
            sleep 3
          done
        env:
          GH_TOKEN: ${{ secrets.GH_TOKEN }}
