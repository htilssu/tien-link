name: Manual URL Trigger

on:
  workflow_dispatch:
    inputs:
      url:
        description: "URL to process"
        required: true
        type: string

jobs:
  run:
    strategy:
      matrix:
        os: [ubuntu-latest, windows-latest, macos-latest]
    runs-on: ${{ matrix.os }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up uv
        uses: astral-sh/setup-uv@v5

      - name: Run with URL
        run: uv run tien-link --url "${{ github.event.inputs.url }}"
